<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="corporate_page_title">기업 고객 - CHECKIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <header id="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/로고2.png" alt="CHECKIT Logo" class="header-logo">
                CHECKIT
            </a>
            <nav id="language-switcher">
                <button class="lang-btn active" data-lang="ko">KR</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="cn">CN</button>
                <button class="lang-btn" data-lang="vn">VN</button>
            </nav>
        </div>
    </header>

    <main>
        <section id="corporate-hero" class="section">
            <div class="container">
                <div class="hero-text-content">
                    <h1 class="hero-title" data-lang-key="corporate_page_title"></h1>
                    <p class="hero-subtitle" data-lang-key="corporate_page_subtitle"></p>
                    <a href="#contact-form" class="cta-button-primary" data-lang-key="hero_cta"></a>
                </div>
            </div>
        </section>

        <section id="corporate-solutions" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="corporate_solutions_title">기업을 위한 최적의 파트너</h2>
                <div class="features-grid-new">
                    <div class="feature-item-new">
                        <i class="fas fa-user-shield"></i>
                        <h3 data-lang-key="corporate_service1_title"></h3>
                        <p data-lang-key="corporate_service1_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-chart-line"></i>
                        <h3 data-lang-key="corporate_service2_title"></h3>
                        <p data-lang-key="corporate_service2_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-smile-beam"></i>
                        <h3 data-lang-key="corporate_service3_title"></h3>
                        <p data-lang-key="corporate_service3_desc"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="corporate-process" class="section alternate-bg">
            <div class="container">
                <h2 class="section-title" data-lang-key="corporate_process_title">진행 프로세스</h2>
                <div class="process-steps">
                    <div class="step">
                        <div class="step-number">1</div>
                        <h3 data-lang-key="corporate_process_step1_title">도입 상담</h3>
                        <p data-lang-key="corporate_process_step1_desc">기업의 규모와 필요 요구사항을 분석하여 최적의 플랜을 제안합니다.</p>
                    </div>
                    <div class="step">
                        <div class="step-number">2</div>
                        <h3 data-lang-key="corporate_process_step2_title">맞춤형 설계</h3>
                        <p data-lang-key="corporate_process_step2_desc">외국인 근로자들을 위한 다국어 안내 자료와 검진 시스템을 준비합니다.</p>
                    </div>
                    <div class="step">
                        <div class="step-number">3</div>
                        <h3 data-lang-key="corporate_process_step3_title">운영 및 관리</h3>
                        <p data-lang-key="corporate_process_step3_desc">검진 예약부터 결과 사후 관리까지 CHECKIT이 원스톱으로 지원합니다.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact-form" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="contact_title_new"></h2>
                <p class="section-subtitle" data-lang-key="contact_subtitle_new"></p>
                <form class="contact-form-body">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="company-name" data-lang-key="contact_form_company_label">기업명</label>
                            <input type="text" id="company-name" name="company-name" required placeholder="회사명을 입력해주세요.">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="email" data-lang-key="contact_form_email_label"></label>
                            <input type="email" id="email" name="email" required data-lang-key="contact_form_email_placeholder">
                        </div>
                        <div class="form-group">
                            <label for="phone" data-lang-key="contact_form_phone_label"></label>
                            <input type="tel" id="phone" name="phone" data-lang-key="contact_form_phone_placeholder">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="message" data-lang-key="contact_form_message_label"></label>
                            <textarea id="message" name="message" rows="6" required data-lang-key="contact_form_message_placeholder"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="cta-button-primary" data-lang-key="contact_form_submit_button"></button>
                </form>
            </div>
        </section>
    </main>

    <button id="open-chatbot"><i class="fas fa-comment-dots"></i></button>
    <div id="chatbot-container">
        <div id="chatbot-header">
            <span class="chatbot-title" data-lang-key="chatbot_header"></span>
            <div id="chatbot-lang-buttons">
                <button class="chatbot-lang-btn" data-lang="ko">KR</button>
                <button class="chatbot-lang-btn" data-lang="en">EN</button>
                <button class="chatbot-lang-btn" data-lang="cn">CN</button>
                <button class="chatbot-lang-btn" data-lang="vn">VN</button>
            </div>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-messages"></div>
        <div id="chatbot-bottom-container">
            <div id="chatbot-suggested-questions"></div>
            <div id="chatbot-input-container">
                <input type="text" id="chatbot-input" data-lang-key="chatbot_placeholder">
                <button id="chatbot-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
