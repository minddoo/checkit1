<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="main_page_title">CHECKIT - 외국인 건강검진 예약</title>
    <link rel="stylesheet" href="style.css?v=6.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="assets/js/layout-loader.js" defer></script>
</head>
<body>
    <!-- HEADER -->
    <header id="main-header"></header>

    <main>
        <!-- HERO -->
        <section id="hero" class="reveal">
            <div class="hero-content">
                <h1 class="hero-title" data-lang-key="hero_title"></h1>
                <p class="hero-subtitle" data-lang-key="hero_subtitle"></p>
                <a href="#contact-form" class="cta-button-primary" data-lang-key="hero_cta"></a>
            </div>
        </section>

        <!-- SERVICE FOR -->
        <section id="service-for" class="section reveal">
            <div class="container">
                <h2 class="section-title" data-lang-key="service_for_title"></h2>
                <div class="card-container">
                    <div class="card">
                        <i class="fas fa-building"></i>
                        <h3 data-lang-key="corporate_title"></h3>
                        <p data-lang-key="corporate_desc"></p>
                        <a href="corporate.html" class="cta-button-secondary" data-lang-key="learn_more"></a>
                    </div>
                </div>
            </div>
        </section>

        <!-- WHY CHOOSE US -->
        <section id="why-us" class="section alternate-bg reveal">
            <div class="container">
                <div class="section-title-container">
                    <h2 class="section-title" data-lang-key="why_us_title"></h2>
                    <div class="blinking-character"></div>
                </div>
                <p class="section-subtitle" data-lang-key="why_us_subtitle_new"></p>
                <div class="features-grid-new">
                    <div class="feature-item-new">
                        <i class="fas fa-headset"></i>
                        <h3 data-lang-key="why_us_feature1_title"></h3>
                        <p data-lang-key="why_us_feature1_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-hand-holding-heart"></i>
                        <h3 data-lang-key="why_us_feature2_title"></h3>
                        <p data-lang-key="why_us_feature2_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-file-alt"></i>
                        <h3 data-lang-key="why_us_feature3_title"></h3>
                        <p data-lang-key="why_us_feature3_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-won-sign"></i>
                        <h3 data-lang-key="why_us_feature4_title"></h3>
                        <p data-lang-key="why_us_feature4_desc"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- PROCESS -->
        <section id="process-new" class="section reveal">
            <div class="container">
                <h2 class="section-title" data-lang-key="process_title"></h2>
                <div class="process-steps">
                    <div class="step">
                        <div class="step-number">1</div>
                        <h3 data-lang-key="process_step1_title"></h3>
                        <p data-lang-key="process_step1_desc_new"></p>
                    </div>
                    <div class="step">
                        <div class="step-number">2</div>
                        <h3 data-lang-key="process_step2_title"></h3>
                        <p data-lang-key="process_step2_desc_new"></p>
                    </div>
                    <div class="step">
                        <div class="step-number">3</div>
                        <h3 data-lang-key="process_step3_title_new"></h3>
                        <p data-lang-key="process_step3_desc_new"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- TESTIMONIALS -->
        <section id="testimonials" class="section alternate-bg reveal">
            <div class="container">
                <h2 class="section-title" data-lang-key="testimonials_title"></h2>
                <p class="section-subtitle" data-lang-key="testimonials_subtitle"></p>
                <div class="testimonial-grid">
                    <div class="testimonial-card">
                        <p class="testimonial-text" data-lang-key="testimonial1_text"></p>
                        <div class="testimonial-author">
                            <strong data-lang-key="testimonial1_author"></strong>
                            <span data-lang-key="testimonial1_type"></span>
                        </div>
                    </div>
                    <div class="testimonial-card">
                        <p class="testimonial-text" data-lang-key="testimonial2_text"></p>
                        <div class="testimonial-author">
                            <strong data-lang-key="testimonial2_author"></strong>
                            <span data-lang-key="testimonial2_type"></span>
                        </div>
                    </div>
                    <div class="testimonial-card">
                        <p class="testimonial-text" data-lang-key="testimonial3_text"></p>
                        <div class="testimonial-author">
                            <strong data-lang-key="testimonial3_author"></strong>
                            <span data-lang-key="testimonial3_type"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- CONTACT FORM -->
        <section id="contact-form" class="section reveal">
            <div class="container">
                <h2 class="section-title" data-lang-key="contact_title_new"></h2>
                <p class="section-subtitle" data-lang-key="contact_subtitle_new"></p>
                <form class="contact-form-body">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="email" data-lang-key="contact_form_email_label"></label>
                            <input type="email" id="email" name="email" required data-lang-key="contact_form_email_placeholder">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone" data-lang-key="contact_form_phone_label"></label>
                        <input type="tel" id="phone" name="phone" data-lang-key="contact_form_phone_placeholder">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="message" data-lang-key="contact_form_message_label"></label>
                        <textarea id="message" name="message" rows="6" required data-lang-key="contact_form_message_placeholder"></textarea>
                    </div>
                    <button type="submit" class="cta-button-primary" data-lang-key="contact_form_submit_button"></button>
                </form>
            </div>
        </section>
    </main>

    <!-- My Page Overlay -->
    <div id="mypage-overlay"></div>

    <!-- CHATBOT -->
    <button id="open-chatbot"><i class="fas fa-comment-dots"></i></button>
    <div id="chatbot-container">
        <div id="chatbot-header">
            <span class="chatbot-title" data-lang-key="chatbot_header"></span>
            <div id="chatbot-lang-buttons">
                <button class="chatbot-lang-btn" data-lang="ko">KR</button>
                <button class="chatbot-lang-btn" data-lang="en">EN</button>
                <button class="chatbot-lang-btn" data-lang="cn">CN</button>
                 <button class="chatbot-lang-btn" data-lang="vn">VN</button>
            </div>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-messages"></div>
        <div id="chatbot-bottom-container">
            <div id="chatbot-suggested-questions"></div>
            <div id="chatbot-input-container">
                <input type="text" id="chatbot-input" data-lang-key="chatbot_placeholder">
                <button id="chatbot-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Footer Section -->
    <footer class="site-footer"></footer>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <script src="script.js?v=4.2"></script>

    <!-- Login Modal -->
    <div id="login-modal-overlay">
        <div class="login-modal-box">
            <span id="close-login-modal" class="close-button">&times;</span>
            <div class="login-header">
                <h2 data-lang-key="login_title">로그인</h2>
            </div>

            <!-- Tab Buttons -->
            <div class="modal-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
                <button id="tab-btn-corp" class="active" style="flex: 1; padding: 10px; border:none; background:transparent; font-weight:bold; cursor:pointer;" onclick="window.switchLoginTab('corp')">기업용</button>
                <button id="tab-btn-worker" style="flex: 1; padding: 10px; border:none; background:transparent; font-weight:bold; cursor:pointer; color:#64748b;" onclick="window.switchLoginTab('worker')">근로자용</button>
            </div>

            <!-- Corporate Admin Form -->
            <div id="login-corp-content" class="tab-content active">
                <form id="login-form-corporate">
                    <div class="form-group">
                        <label for="login-company-key" data-lang-key="login_company_key_label"></label>
                        <input type="text" id="login-company-key" required>
                    </div>
                    <div class="form-group">
                        <label for="login-security-key" data-lang-key="login_security_key_label"></label>
                        <input type="password" id="login-security-key" required>
                    </div>
                    <button type="submit" class="cta-button-primary" data-lang-key="login_btn">로그인</button>
                </form>
            </div>

            <!-- Worker Login Form -->
            <div id="login-worker-content" class="tab-content" style="display:none;">
                <form id="login-form-worker-simplified">
                    <div class="form-group">
                        <label for="login-worker-company-key">회사 입력키 (Company Input Key)</label>
                        <input type="text" id="login-worker-company-key" placeholder="부여받은 회사 입력키 입력" required>
                    </div>
                    <div class="form-group">
                        <label for="login-worker-security-key">암호키 (Security Key)</label>
                        <input type="password" id="login-worker-security-key" placeholder="부여받은 암호키" required>
                    </div>
                    <button type="submit" class="cta-button-primary">기존 계정으로 로그인</button>
                </form>
                <div class="login-links" style="margin-top: 20px; text-align: center;">
                    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 5px;">계정이 아직 없으신가요?</p>
                    <a href="#" id="signup-link-worker" style="color: var(--primary); font-weight: 600; text-decoration: underline;">회원가입 하기</a>
                </div>
            </div>

            <div class="login-links" style="margin-top: 20px; text-align: center;">
                <a href="#" id="back-to-login" style="color: var(--text-muted); font-size: 0.9rem;">이미 계정이 있으신가요? 로그인</a>
            </div>

        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signup-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 2000; justify-content: center; align-items: center;">
        <div class="login-modal-box" style="max-height: 90vh; overflow-y: auto;">
            <span id="close-signup-modal" class="close-button">&times;</span>
            <div class="login-header">
                <h2 data-lang-key="signup_title">회원가입</h2>
            </div>
            
            <!-- Signup Tab Buttons -->
            <div class="modal-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
                <button id="signup-tab-worker" class="active" style="flex: 1; padding: 10px; border:none; background:transparent; font-weight:bold; cursor:pointer; color:var(--primary); border-bottom: 2px solid var(--primary);" onclick="window.switchSignupTab('worker')">근로자 회원가입</button>
            </div>

            <!-- Worker Signup content -->
            <div id="signup-worker-content" class="tab-content active" style="display:block;">
                <form id="signup-form-worker-simplified">
                    <div class="form-group" style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label>성함 (Name)</label>
                            <input type="text" id="signup-worker-name" placeholder="예: 홍길동" required>
                        </div>
                        <div style="flex: 1;">
                            <label>생년월일 (DOB)</label>
                            <input type="date" id="signup-worker-birth" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>회사 입력키 (Company Input Key)</label>
                        <input type="text" id="signup-worker-company-key" required placeholder="관리자에게 공유받은 키 입력">
                    </div>
                    <div class="form-group">
                        <label>생성할 암호키 (Security Key)</label>
                        <input type="password" id="signup-worker-security-key" required placeholder="worker+영문,숫자,특수문자 포함 6자리 이상">
                        <small style="color: #64748b; font-size: 0.8rem; display: block; margin-top: 4px;">형식: worker로 시작 (예: worker123!@)</small>
                    </div>
                    <!-- 동의 섹션 헤더 -->
                    <div style="margin-top: 20px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-file-signature" style="color: var(--primary); font-size: 1.1rem;"></i>
                        <strong style="font-size: 0.95rem; color: #1e293b;">필수 동의 항목</strong>
                        <span style="font-size: 0.78rem; color: #ef4444; font-weight: 600;">* 모두 동의해야 가입이 완료됩니다</span>
                    </div>

                    <!-- 1. 개인정보 수집 및 이용 동의 -->
                    <div class="consent-box" style="background: #f0f7ff; border-radius: 10px; padding: 14px 16px; border: 1px solid #d0e3ff; margin-bottom: 10px;">
                        <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.92rem; line-height: 1.5; color: #334155;">
                            <input type="checkbox" id="signup-worker-consent-privacy" required style="margin-top: 3px; width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0;">
                            <span>
                                <strong>[필수] 개인정보 수집 및 이용 동의</strong>
                                <a href="javascript:void(0)" onclick="this.parentElement.querySelector('.consent-detail').style.display = this.parentElement.querySelector('.consent-detail').style.display === 'none' ? 'block' : 'none'" style="font-size: 0.78rem; color: var(--primary); margin-left: 6px; text-decoration: underline;">내용 보기 ▾</a>
                                <div class="consent-detail" style="display: none; margin-top: 8px; font-size: 0.8rem; color: #475569; background: #fff; border-radius: 8px; padding: 12px; line-height: 1.7; border: 1px solid #e2e8f0;">
                                    <strong>수집 항목:</strong> 성명, 생년월일, 국적, 외국인등록번호(앞자리), 휴대전화번호, 주소, 소속 현장.<br><br>
                                    <strong>수집 목적:</strong> 본인 식별, 검진 대상자 명단 확인, 현장별 검진 일정 안내 및 관리.<br><br>
                                    <strong>보관 및 파기:</strong> 관련 법령에 의거하여 서비스 탈퇴 후 5년간 보관 후 파기 (의료법 및 대화 내용 증빙용).
                                </div>
                            </span>
                        </label>
                    </div>

                    <!-- 2. 비의료 행정 지원 및 대리 예약 서비스 동의 -->
                    <div class="consent-box" style="background: #f0f7ff; border-radius: 10px; padding: 14px 16px; border: 1px solid #d0e3ff; margin-bottom: 10px;">
                        <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.92rem; line-height: 1.5; color: #334155;">
                            <input type="checkbox" id="signup-worker-consent-admin" required style="margin-top: 3px; width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0;">
                            <span>
                                <strong>[필수] 비의료 행정 지원 및 대리 예약 서비스 동의</strong>
                                <a href="javascript:void(0)" onclick="this.parentElement.querySelector('.consent-detail').style.display = this.parentElement.querySelector('.consent-detail').style.display === 'none' ? 'block' : 'none'" style="font-size: 0.78rem; color: var(--primary); margin-left: 6px; text-decoration: underline;">내용 보기 ▾</a>
                                <div class="consent-detail" style="display: none; margin-top: 8px; font-size: 0.8rem; color: #475569; background: #fff; border-radius: 8px; padding: 12px; line-height: 1.7; border: 1px solid #e2e8f0;">
                                    <strong>서비스 정의:</strong> '체킷'은 의료법상 진료 알선이나 유인을 하지 않는 <strong>'비의료 소통 지원 플랫폼'</strong>입니다. 병원과 수수료 계약이 없으며, 오직 병원-근로자-기업 사이의 의사소통 및 행정 공백을 채우는 역할만 수행합니다.<br><br>
                                    <strong>대리 예약 및 행정 지원:</strong> 원활한 검진을 위해 근로자를 대신하여 검진 기간/예약 가능 기간 확인, 필수 검진 항목 체크, 예약 접수, 필요 서류 안내를 대행하는 것에 동의합니다.<br><br>
                                    <strong>지원 범위:</strong> 서비스는 검진 결과 수령 후 기업 제출용 필수 서류 발급 지원 및 재검사 완료 시점까지의 행정 소통에 한정됩니다.
                                </div>
                            </span>
                        </label>
                    </div>

                    <!-- 3. 민감정보(의료 데이터) 처리 및 결과지 수신 동의 -->
                    <div class="consent-box" style="background: #f0f7ff; border-radius: 10px; padding: 14px 16px; border: 1px solid #d0e3ff; margin-bottom: 14px;">
                        <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.92rem; line-height: 1.5; color: #334155;">
                            <input type="checkbox" id="signup-worker-consent-medical" required style="margin-top: 3px; width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0;">
                            <span>
                                <strong>[필수] 민감정보(의료 데이터) 처리 및 결과지 수신 동의</strong>
                                <a href="javascript:void(0)" onclick="this.parentElement.querySelector('.consent-detail').style.display = this.parentElement.querySelector('.consent-detail').style.display === 'none' ? 'block' : 'none'" style="font-size: 0.78rem; color: var(--primary); margin-left: 6px; text-decoration: underline;">내용 보기 ▾</a>
                                <div class="consent-detail" style="display: none; margin-top: 8px; font-size: 0.8rem; color: #475569; background: #fff; border-radius: 8px; padding: 12px; line-height: 1.7; border: 1px solid #e2e8f0;">
                                    <strong>제공 내용:</strong> 병원으로부터 발행된 원본 결과지와 함께, 이해를 돕기 위한 단순 번역 결과지 및 질병분류코드(KCD/ICD) 정보를 수신하고 이를 소속 기업 관리자와 공유하는 것에 동의합니다.<br><br>
                                    <strong>의료 면책 고지:</strong> 제공되는 번역문과 질병코드는 단순 참고용이며 법적/의학적 효력이 없습니다. 정확한 진단과 치료는 반드시 검진 기관(병원)에 직접 내원하여 의료진과 상담해야 합니다.
                                </div>
                            </span>
                        </label>
                    </div>

                    <!-- 전체 동의 버튼 -->
                    <div style="margin-bottom: 14px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.88rem; color: #475569; padding: 8px 0;">
                            <input type="checkbox" id="signup-worker-consent-all" style="width: 18px; height: 18px; accent-color: var(--primary);">
                            <span style="font-weight: 600; color: #1e293b;">위 약관에 모두 동의합니다</span>
                        </label>
                    </div>

                    <button type="submit" class="cta-button-primary">회원가입 완료</button>
                </form>
				<div class="login-links" style="justify-content: center; margin-top: 20px;">
                    <a href="#" id="back-to-login" data-lang-key="switch_to_login">이미 계정이 있으신가요? 로그인</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
