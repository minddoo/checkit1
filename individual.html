<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="individual_page_title">개인 고객 - CHECKIT</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <header id="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/로고2.png" alt="CHECKIT Logo" class="header-logo">
                CHECKIT
            </a>
            <nav id="language-switcher">
                <button class="lang-btn active" data-lang="ko">KR</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="cn">CN</button>
                <button class="lang-btn" data-lang="vn">VN</button>
            </nav>
        </div>

    <main>
        <section id="individual-hero">
            <div class="container">
                <div class="hero-text-content">
                    <h1 class="hero-title" data-lang-key="individual_page_title"></h1>
                    <p class="hero-subtitle" data-lang-key="individual_page_subtitle"></p>
                    <a href="#contact-form" class="cta-button-primary" data-lang-key="hero_cta"></a>
                </div>
                <div class="hero-character"></div>
            </div>
        </section>

        <section id="korea-medical-expectation" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="expectation_title"></h2>
                <p class="section-subtitle" data-lang-key="expectation_subtitle"></p>
                <div class="expectation-item">
                    <div class="expectation-image">
                        <img src="https://placehold.co/600x400?text=Cost+Efficiency" alt="Cost efficiency concept">
                    </div>
                    <div class="expectation-text">
                        <h3 class="expectation-item-title" data-lang-key="expectation_item_title_1"></h3>
                        <p class="expectation-item-desc" data-lang-key="expectation_item_desc_1"></p>
                    </div>
                </div>
                <div class="expectation-item">
                    <div class="expectation-image">
                        <img src="https://placehold.co/600x400?text=Convenience" alt="Convenience concept">
                    </div>
                    <div class="expectation-text">
                        <h3 class="expectation-item-title" data-lang-key="expectation_item_title_2"></h3>
                        <p class="expectation-item-desc" data-lang-key="expectation_item_desc_2"></p>
                    </div>
                </div>
                <div class="expectation-item">
                    <div class="expectation-image">
                       <img src="https://placehold.co/600x400?text=Professional+Quality" alt="Professional quality concept">
                    </div>
                    <div class="expectation-text">
                        <h3 class="expectation-item-title" data-lang-key="expectation_item_title_3"></h3>
                        <p class="expectation-item-desc" data-lang-key="expectation_item_desc_3"></p>
                    </div>
                </div>
                <div class="expectation-item">
                    <div class="expectation-image">
                        <img src="https://placehold.co/600x400?text=Time+Saving" alt="Time saving concept">
                    </div>
                    <div class="expectation-text">
                        <h3 class="expectation-item-title" data-lang-key="expectation_item_title_4"></h3>
                        <p class="expectation-item-desc" data-lang-key="expectation_item_desc_4"></p>
                    </div>
                </div>
            </div>
        </section>

        <div class="reality-wrapper">
            <section id="korea-medical-reality" class="section">
                <div class="container">
                    <h2 class="section-title" data-lang-key="reality_title"></h2>
                    <div class="reality-grid">
                        <div class="reality-card">
                            <h3 class="reality-item-title" data-lang-key="reality_item_title_1"></h3>
                            <ul class="reality-list">
                                <li data-lang-key="reality_item_1_point_1"></li>
                                <li data-lang-key="reality_item_1_point_2"></li>
                                <li data-lang-key="reality_item_1_point_3"></li>
                                <li data-lang-key="reality_item_1_point_4"></li>
                            </ul>
                        </div>
                        <div class="reality-card">
                            <h3 class="reality-item-title" data-lang-key="reality_item_title_2"></h3>
                            <ul class="reality-list">
                                <li data-lang-key="reality_item_2_point_1"></li>
                                <li data-lang-key="reality_item_2_point_2"></li>
                                <li data-lang-key="reality_item_2_point_3"></li>
                                <li data-lang-key="reality_item_2_point_4"></li>
                            </ul>
                        </div>
                        <div class="reality-card">
                            <h3 class="reality-item-title" data-lang-key="reality_item_title_3"></h3>
                            <ul class="reality-list">
                                <li data-lang-key="reality_item_3_point_1"></li>
                                <li data-lang-key="reality_item_3_point_2"></li>
                                <li data-lang-key="reality_item_3_point_3"></li>
                                <li data-lang-key="reality_item_3_point_4"></li>
                            </ul>
                        </div>
                        <div class="reality-card">
                            <h3 class="reality-item-title" data-lang-key="reality_item_title_4"></h3>
                            <ul class="reality-list">
                                <li data-lang-key="reality_item_4_point_1"></li>
                                <li data-lang-key="reality_item_4_point_2"></li>
                                <li data-lang-key="reality_item_4_point_3"></li>
                                <li data-lang-key="reality_item_4_point_4"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </section>

            <section id="reality-overtime" class="section">
                <div class="container">
                    <h2 class="section-title" data-lang-key="reality_overtime_title"></h2>
                    <div class="story-content">
                        <p data-lang-key="reality_overtime_p1"></p>
                        <p data-lang-key="reality_overtime_p2"></p>
                        <p data-lang-key="reality_overtime_p3"></p>
                        <p class="highlight-text" data-lang-key="reality_overtime_p4"></p>
                        <p data-lang-key="reality_overtime_p5"></p>
                        <p data-lang-key="reality_overtime_p6"></p>
                        <p data-lang-key="reality_overtime_p7"></p>
                        <p data-lang-key="reality_overtime_p8"></p>
                        <p data-lang-key="reality_overtime_p9"></p>
                        <p class="highlight-text" data-lang-key="reality_overtime_p10"></p>
                        <p data-lang-key="reality_overtime_p11"></p>
                    </div>
                </div>
            </section>
        </div>

        <section id="individual-solutions" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="solution_title"></h2>
                <p class="section-subtitle" data-lang-key="solution_subtitle"></p>
                <div class="features-grid-new">
                    <div class="feature-item-new">
                        <i class="fas fa-user-tie"></i>
                        <h3 data-lang-key="individual_service1_title"></h3>
                        <p data-lang-key="individual_service1_desc"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-comments"></i>
                        <h3 data-lang-key="individual_service2_title_new"></h3>
                        <p data-lang-key="individual_service2_desc_new"></p>
                    </div>
                    <div class="feature-item-new">
                        <i class="fas fa-file-invoice"></i>
                        <h3 data-lang-key="individual_service3_title_new"></h3>
                        <p data-lang-key="individual_service3_desc_new"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="packages-section" class="section alternate-bg">
            <div class="container">
                <h2 class="section-title" data-lang-key="packages_title"></h2>
                <p class="section-subtitle" data-lang-key="packages_subtitle"></p>
                <div class="packages-grid">
                    <!-- Package 1 -->
                    <div class="package-card package-no-confusion">
                        <div class="package-header">
                            <h3 data-lang-key="package1_title"></h3>
                            <div class="price" data-lang-key="package1_price"></div>
                        </div>
                        <div class="package-body">
                            <h4 data-lang-key="package_includes"></h4>
                            <ul>
                                <li data-lang-key="package1_feature1"></li>
                                <li data-lang-key="package1_feature2"></li>
                                <li data-lang-key="package1_feature3"></li>
                                <li data-lang-key="package1_feature4"></li>
                                <li data-lang-key="package1_feature5"></li>
                                <li data-lang-key="package1_feature6"></li>
                                <li data-lang-key="package1_feature7"></li>
                                <li data-lang-key="package1_feature8"></li>
                                <li data-lang-key="package1_feature9"></li>
                            </ul>
                            <div class="recommend">
                                <h4 data-lang-key="package_recommend_title"></h4>
                                <p data-lang-key="package1_recommend_desc"></p>
                            </div>
                        </div>
                    </div>
                    <!-- Package 2 -->
                    <div class="package-card package-zero-mistake">
                        <div class="package-header">
                            <h3 data-lang-key="package2_title"></h3>
                            <div class="price" data-lang-key="package2_price"></div>
                        </div>
                        <div class="package-body">
                            <h4 data-lang-key="package_includes"></h4>
                            <p class="includes-sub" data-lang-key="package2_includes"></p>
                            <ul>
                                <li data-lang-key="package2_feature1"></li>
                                <li data-lang-key="package2_feature2"></li>
                                <li data-lang-key="package2_feature3"></li>
                                <li data-lang-key="package2_feature4"></li>
                                <li data-lang-key="package2_feature5"></li>
                                <li data-lang-key="package2_feature6"></li>
                                <li data-lang-key="package2_feature7"></li>
                                <li data-lang-key="package2_feature8"></li>
                                <li data-lang-key="package2_feature9"></li>
                            </ul>
                            <div class="recommend">
                                <h4 data-lang-key="package_recommend_title"></h4>
                                <p data-lang-key="package2_recommend_desc"></p>
                            </div>
                        </div>
                    </div>
                    <!-- Package 3 -->
                    <div class="package-card package-total-safe">
                        <div class="package-header">
                            <h3 data-lang-key="package3_title"></h3>
                            <div class="price" data-lang-key="package3_price"></div>
                        </div>
                        <div class="package-body">
                            <h4 data-lang-key="package_includes"></h4>
                            <p class="includes-sub" data-lang-key="package3_includes"></p>
                            <ul>
                                <li data-lang-key="package3_feature1"></li>
                                <li data-lang-key="package3_feature2"></li>
                                <li data-lang-key="package3_feature3"></li>
                                <li data-lang-key="package3_feature4"></li>
                                <li data-lang-key="package3_feature5"></li>
                                <li data-lang-key="package3_feature6"></li>
                                <li data-lang-key="package3_feature7"></li>
                                <li data-lang-key="package3_feature8"></li>
                                <li data-lang-key="package3_feature9"></li>
                                <li data-lang-key="package3_feature10"></li>
                                <li data-lang-key="package3_feature11"></li>
                                <li data-lang-key="package3_feature12"></li>
                                <li data-lang-key="package3_feature13"></li>
                            </ul>
                            <div class="recommend">
                                <h4 data-lang-key="package_recommend_title"></h4>
                                <p data-lang-key="package3_recommend_desc"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="additional-options" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="options_title_new"></h2>
                <div class="options-grid">
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_1"></h3>
                        <div class="option-price" data-lang-key="option_card_price_1"></div>
                        <p data-lang-key="option_card_desc_1"></p>
                    </div>
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_2"></h3>
                        <div class="option-price" data-lang-key="option_card_price_2"></div>
                        <p data-lang-key="option_card_desc_2"></p>
                    </div>
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_3"></h3>
                        <p data-lang-key="option_card_desc_3"></p>
                        <ul class="option-details">
                            <li><span data-lang-key="option_card_3_item_1"></span> ₩11,000</li>
                            <li><span data-lang-key="option_card_3_item_2"></span> ₩16,500</li>
                            <li><span data-lang-key="option_card_3_item_3"></span> ₩27,500</li>
                        </ul>
                    </div>
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_4"></h3>
                        <div class="option-price" data-lang-key="option_card_price_4"></div>
                        <p data-lang-key="option_card_desc_4"></p>
                    </div>
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_5"></h3>
                        <div class="option-price" data-lang-key="option_card_price_5"></div>
                        <p data-lang-key="option_card_desc_5"></p>
                    </div>
                    <div class="option-card">
                        <h3 data-lang-key="option_card_title_6"></h3>
                        <div class="option-price" data-lang-key="option_card_price_6"></div>
                        <p data-lang-key="option_card_desc_6"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="notice-section" class="section alternate-bg">
            <div class="container">
                <h2 class="section-title" data-lang-key="notice_title"></h2>
                <p class="section-subtitle" data-lang-key="notice_subtitle"></p>
                <div class="notice-content">
                    <p class="quote" data-lang-key="notice_quote"></p>
                    <div class="answer-box">
                        <h3 data-lang-key="notice_answer_title"></h3>
                        <p data-lang-key="notice_answer_p1"></p>
                        <p data-lang-key="notice_answer_p2"></p>
                    </div>
                    <div class="reality-box">
                        <h3 data-lang-key="notice_reality_title"></h3>
                        <p data-lang-key="notice_reality_p1"></p>
                    </div>
                    <div class="situation-box">
                        <h3 data-lang-key="notice_situation_title"></h3>
                        <p data-lang-key="notice_situation_p1"></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact-form" class="section">
            <div class="container">
                <h2 class="section-title" data-lang-key="contact_title_new"></h2>
                <p class="section-subtitle" data-lang-key="contact_subtitle_new"></p>
                <form class="contact-form-body">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="email" data-lang-key="contact_form_email_label"></label>
                            <input type="email" id="email" name="email" required data-lang-key="contact_form_email_placeholder">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="phone" data-lang-key="contact_form_phone_label"></label>
                            <input type="tel" id="phone" name="phone" data-lang-key="contact_form_phone_placeholder">
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="message" data-lang-key="contact_form_message_label"></label>
                        <textarea id="message" name="message" rows="6" required data-lang-key="contact_form_message_placeholder"></textarea>
                    </div>
                    <button type="submit" class="cta-button-primary" data-lang-key="contact_form_submit_button"></button>
                </form>
            </div>
        </section>
    </main>

    <footer id="main-footer" class="section">
        <div class="container">
            <p>&copy; 2026 CHECKIT. All rights reserved.</p>
        </div>
    </footer>

    <!-- Chatbot UI -->
    <button id="open-chatbot"><i class="fas fa-comment-dots"></i></button>
    <div id="chatbot-container">
        <div id="chatbot-header">
            <span class="chatbot-title" data-lang-key="chatbot_header">Check봇</span>
            <div id="chatbot-lang-buttons">
                <button class="chatbot-lang-btn" data-lang="ko">KR</button>
                <button class="chatbot-lang-btn" data-lang="en">EN</button>
                <button class="chatbot-lang-btn" data-lang="cn">CN</button>
                <button class="chatbot-lang-btn" data-lang="vn">VN</button>
            </div>
            <button id="close-chatbot">&times;</button>
        </div>
        <div id="chatbot-messages"></div>
        <div id="chatbot-bottom-container">
            <div id="chatbot-suggested-questions"></div>
            <div id="chatbot-input-container">
                <input type="text" id="chatbot-input" data-lang-key="chatbot_placeholder">
                <button id="chatbot-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js?v=3.0"></script>
</body>
</html>
