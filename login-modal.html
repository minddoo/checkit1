<!-- Login Modal -->
<div id="login-modal-overlay">
    <div class="login-modal-box">
        <span class="close-button" id="close-login-modal">&times;</span>
        
        <div class="login-tabs">
            <button class="tab-link active" data-tab="individual-login" data-lang-key="individual_customer">개인 고객</button>
            <button class="tab-link" data-tab="corporate-login" data-lang-key="corporate_admin">기업 관리자</button>
        </div>

        <div id="individual-login" class="tab-content active">
            <form id="individual-login-form">
                <div class="form-group">
                    <label for="individual-email" data-lang-key="login_email_placeholder">이메일</label>
                    <input type="text" id="individual-email" required>
                </div>
                <div class="form-group">
                    <label for="individual-password" data-lang-key="login_pass_placeholder">비밀번호</label>
                    <input type="password" id="individual-password" required>
                </div>
                <button type="submit" class="cta-button-primary" data-lang-key="login_btn">로그인</button>
            </form>
            <div class="divider" data-lang-key="login_or">또는</div>
            <button class="google-login-button" id="google-login-btn">
                <img src="assets/google_logo.svg" alt="Google icon">
                <span data-lang-key="login_google">Google 로그인</span>
            </button>
            <div class="login-links">
                <a href="#" data-lang-key="find_credentials">이메일/비밀번호 찾기</a>
                <a href="#" data-lang-key="register">회원가입</a>
            </div>
        </div>

        <div id="corporate-login" class="tab-content">
             <form id="corporate-login-form">
                <div class="form-group">
                    <label for="corporate-email" data-lang-key="login_email_placeholder">이메일</label>
                    <input type="text" id="corporate-email" required>
                </div>
                <div class="form-group">
                    <label for="corporate-password" data-lang-key="login_pass_placeholder">비밀번호</label>
                    <input type="password" id="corporate-password" required>
                </div>
                <button type="submit" class="cta-button-primary" data-lang-key="login_btn">로그인</button>
            </form>
             <div class="login-links" style="justify-content: center; margin-top: 20px;">
                 <a href="#" data-lang-key="find_credentials">이메일/비밀번호 찾기</a>
            </div>
        </div>

    </div>
</div>

<!-- Find Credentials Modal -->
<div id="find-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div class="login-modal-box" style="background:#fff; padding:30px; border-radius:16px; width:90%; max-width:400px; position:relative;">
        <span class="close-button" id="close-find-modal" style="position:absolute; top:15px; right:20px; font-size:24px; cursor:pointer;">&times;</span>
        <h2 style="margin-top:0; font-size:1.5rem; color:#1e293b; margin-bottom:20px;" data-lang-key="find_title">계정 정보 찾기</h2>
        <p style="font-size:0.9rem; color:#64748b; margin-bottom:20px;" data-lang-key="find_desc">가입 시 입력하신 이름, 생년월일, 회사키를 입력해 주세요.</p>
        
        <form id="find-credentials-form">
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; font-size:0.85rem; font-weight:600; color:#475569; margin-bottom:5px;" data-lang-key="find_name">이름 (Name)</label>
                <input type="text" id="find-name" required style="width:100%; padding:10px 15px; border:1px solid #cbd5e1; border-radius:10px; font-size:0.95rem;">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; font-size:0.85rem; font-weight:600; color:#475569; margin-bottom:5px;" data-lang-key="find_dob">생년월일 (DOB)</label>
                <input type="date" id="find-dob" required style="width:100%; padding:10px 15px; border:1px solid #cbd5e1; border-radius:10px; font-size:0.95rem;">
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label style="display:block; font-size:0.85rem; font-weight:600; color:#475569; margin-bottom:5px;" data-lang-key="find_company">회사 입력키 (Company Key)</label>
                <input type="text" id="find-company-key" required style="width:100%; padding:10px 15px; border:1px solid #cbd5e1; border-radius:10px; font-size:0.95rem;">
            </div>
            <button type="submit" class="cta-button-primary" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-weight:700; font-size:1rem; cursor:pointer;" data-lang-key="find_btn">정보 찾기</button>
        </form>
        <div id="find-result" style="display:none; margin-top:20px; padding:15px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px;">
            <p style="margin:0; font-size:0.9rem; color:#166534;" id="find-result-text"></p>
        </div>
    </div>
</div>
