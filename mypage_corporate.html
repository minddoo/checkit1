<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 마이페이지 - CHECKIT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .mypage-container {
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="mypage-container">
        <header class="mypage-header">
            <h1 id="company-name">로딩중...</h1>
            <a href="/index.html" class="btn-home">홈으로 돌아가기</a>
        </header>

        <section class="corp-stats-section">
            <div class="corp-stats-grid">
                <div class="corp-stat-card">
                    <span class="corp-stat-val" id="total-employees">0</span>
                    <span class="corp-stat-label">총 직원</span>
                </div>
                <div class="corp-stat-card pending">
                    <span class="corp-stat-val" id="pending-checkups">0</span>
                    <span class="corp-stat-label">검진 예정</span>
                </div>
                <div class="corp-stat-card completed">
                    <span class="corp-stat-val" id="completed-checkups">0</span>
                    <span class="corp-stat-label">검진 완료</span>
                </div>
                <div class="corp-stat-card expired">
                    <span class="corp-stat-val" id="expired-checkups">0</span>
                    <span class="corp-stat-label">기간 만료</span>
                </div>
            </div>
        </section>

        <section class="employee-list-section">
            <h2>직원 건강검진 현황</h2>
            <div class="corp-filter-bar">
                <input type="text" id="employee-search" class="corp-search" placeholder="직원 이름으로 검색...">
                <select id="status-filter" class="corp-select">
                    <option value="all">전체 상태</option>
                    <option value="pending">검진 예정</option>
                    <option value="completed">검진 완료</option>
                    <option value="expired">기간 만료</option>
                </select>
            </div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>상태</th>
                            <th>검진일</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list-body">
                        <!-- Employee rows will be inserted here by script.js -->
                    </tbody>
                </table>
            </div>
        </section>

    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
