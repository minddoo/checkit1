<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mypage-container">
        <header class="mypage-header">
            <h1>마이페이지</h1>
        </header>
        <main class="mypage-content">
            <div class="profile-card">
                <div class="profile-picture-container">
                    <img src="https://via.placeholder.com/150" alt="프로필 사진" class="profile-picture">
                </div>
                <div class="profile-info">
                    <h2 class="profile-name">김체킷</h2>
                    <p class="profile-email">checkit@example.com</p>
                    <button class="edit-profile-btn">프로필 수정</button>
                </div>
            </div>
            <div class="profile-details">
                <h3>상세 정보</h3>
                <ul>
                    <li><strong>관심분야:</strong> IT, 기술, 보안</li>
                    <li><strong>구독 플랜:</strong> 베이직</li>
                    <li><strong>최근 활동:</strong> 2026-03-04</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
