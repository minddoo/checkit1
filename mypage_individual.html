<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mypage-container">
        <header class="mypage-header">
            <h1>마이페이지</h1>
        </header>
        <main class="mypage-content">
            <div class="profile-card">
                <div class="profile-info">
                    <h2 class="profile-name" id="user-profile-name">김체킷</h2>
                    <p class="profile-email" id="user-profile-email">checkit@example.com</p>
                    <button class="edit-profile-btn">프로필 수정</button>
                </div>
            </div>
            <div class="profile-details">
                <h3>패키지 정보</h3>
                <ul>
                    <li><strong>패키지 이름:</strong> <span id="user-package-name">로딩 중...</span></li>
                    <li><strong>패키지 서비스 항목:</strong> <ul id="user-package-items"><li>로딩 중...</li></ul></li>
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
