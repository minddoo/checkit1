<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 채팅 - 마이페이지</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-upload {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .btn-upload:hover {
            background-color: #0056b3;
        }
        .chat-container {
            display: flex !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h1>마이페이지</h1>
            </div>
            <div class="profile-card">
                <div class="profile-info">
                    <h2 class="profile-name" id="user-profile-name">김체킷</h2>
                    <p class="profile-email" id="user-profile-email">checkit@example.com</p>
                    <button class="edit-profile-btn">프로필 수정</button>
                </div>
            </div>
            <div class="profile-details">
                <h3>패키지 정보</h3>
                <ul>
                    <li><strong>패키지 이름:</strong> <span id="user-package-name">헬스케어 베이직</span></li>
                    <li><strong>서비스 항목:</strong> 
                        <ul id="user-package-items">
                            <li>병원 예약</li>
                            <li>통역 서비스</li>
                        </ul>
                    </li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <a href="/index.html">홈으로 돌아가기</a>
            </div>
        </aside>
        <main class="chat-main">
            <header class="chat-header">
                <div class="chat-header-info">
                    <img src="https://via.placeholder.com/40" alt="Support" class="support-avatar">
                    <div class="support-details">
                        <h4 class="support-name">체킷 서포트</h4>
                        <p class="support-status">온라인</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="upload-results-btn" class="btn-upload">결과지 업로드</button>
                    <input type="file" id="results-file-upload" style="display:none;">
                </div>
            </header>
            <div class="chat-messages" id="chat-messages">
                <div class="message-group">
                    <div class="message-date">2024년 7월 29일</div>
                    <div class="message-item agent">
                        <div class="message-content">
                            <p>안녕하세요, 김체킷님! 체킷 서포트입니다. 무엇을 도와드릴까요?</p>
                        </div>
                        <div class="message-time">오후 2:30</div>
                    </div>
                    <div class="message-item user">
                        <div class="message-content">
                            <p>안녕하세요. 제가 예약한 병원 스케줄을 확인하고 싶어요.</p>
                        </div>
                        <div class="message-time">오후 2:31</div>
                    </div>
                </div>
                 <div class="message-item agent">
                        <div class="message-content">
                            <p>네, 확인해드리겠습니다. 잠시만 기다려주세요.</p>
                        </div>
                        <div class="message-time">오후 2:32</div>
                    </div>
            </div>
            <footer class="chat-input-area">
                <button id="chat-upload-btn" class="chat-icon-btn"><i class="fas fa-paperclip"></i></button>
                <input type="file" id="chat-file-upload" style="display:none;" multiple>
                <input type="text" id="chat-message-input" placeholder="메시지를 입력하세요...">
                <button id="chat-send-btn" class="chat-icon-btn"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
